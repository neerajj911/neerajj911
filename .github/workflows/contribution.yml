name: Auto Contribution

on:
  schedule:
    # Runs every day at 12:00 UTC
    - cron: '0 12 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make Contribution
        run: |
          echo "Last Updated: $(date)" >> contributions.txt
          git add contributions.txt
          git commit -m "chore: daily contribution update" || echo "No changes to commit"
          git push